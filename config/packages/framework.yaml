# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    session: false

    # Trust only the direct TCP client unless behind a trusted reverse proxy (see when@prod / when@test / when@dev).
    trusted_proxies: 'REMOTE_ADDR'
    trusted_headers:
        - x-forwarded-for
        - x-forwarded-proto
        - x-forwarded-port
        - x-forwarded-host

    # Writes: fixed window per client IP stored in Redis (see cache pool rate_limiter.transfer_write).
    rate_limiter:
        transfer_write:
            policy: fixed_window
            limit: '%env(int:TRANSFER_WRITE_RATE_LIMIT)%'
            interval: '1 minute'
            cache_pool: rate_limiter.transfer_write

when@prod:
    framework:
        trusted_proxies: 'PRIVATE_SUBNETS'

when@test:
    framework:
        test: true
        session:
            enabled: true
            storage_factory_id: session.storage.factory.mock_file
        # Hard cap for integration tests (429 assertions). Production-like defaults use .env instead.
        rate_limiter:
            transfer_write:
                limit: 35
